<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="家計簿">
  <title>家計簿</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0d0f1a;--card:#1e2235;--card2:#252840;
      --accent:#6c5ce7;--accent-light:#a29bfe;
      --gold:#fdcb6e;--green:#00b894;--red:#e17055;--blue:#74b9ff;
      --text:#f0f0fa;--text-2:#8892aa;--text-3:#555d75;
      --border:rgba(255,255,255,0.07);
      --nav-h:76px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{height:-webkit-fill-available}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);
      min-height:100vh;min-height:-webkit-fill-available;
      padding-bottom:calc(var(--nav-h) + var(--safe-b));padding-top:var(--safe-t);overflow-x:hidden}
    .nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-b));
      padding-bottom:var(--safe-b);background:rgba(13,15,26,0.97);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border-top:1px solid var(--border);display:flex;z-index:100}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;background:none;border:none;color:var(--text-3);font-size:10px;
      font-family:'Noto Sans JP',sans-serif;cursor:pointer;padding:8px 0 0;transition:color 0.2s}
    .nav-btn svg{width:22px;height:22px}
    .nav-btn.active{color:var(--accent-light)}
    .view{display:none}.view.active{display:block}
    .scroll-area{padding:0 16px 32px}
    .page-header{padding:52px 0 14px;display:flex;align-items:center;justify-content:space-between}
    .page-title{font-size:24px;font-weight:900;letter-spacing:-0.5px}
    .month-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .month-nav button{background:var(--card);border:1px solid var(--border);border-radius:50%;
      width:38px;height:38px;color:var(--text);font-size:18px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .month-label{font-size:18px;font-weight:700;flex:1;text-align:center}
    .widget-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .widget{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px}
    .widget.wide{grid-column:1/-1}
    .widget.accent{background:linear-gradient(145deg,#1c1f33,#252945);border-color:rgba(108,92,231,0.2)}
    .widget.green{background:linear-gradient(145deg,#0d1f1a,#112820);border-color:rgba(0,184,148,0.2)}
    .widget.purple{background:linear-gradient(145deg,#16112a,#1e1840);border-color:rgba(108,92,231,0.25)}
    .w-label{font-size:10px;color:var(--text-2);letter-spacing:0.4px;margin-bottom:8px;line-height:1.5}
    .w-amount{font-size:22px;font-weight:900;letter-spacing:-0.5px;line-height:1}
    .w-amount.big{font-size:34px;letter-spacing:-1px}
    .w-amount.gold{color:var(--gold)}.w-amount.green{color:var(--green)}
    .w-amount.red{color:var(--red)}.w-amount.blue{color:var(--blue)}
    .w-amount.purple{color:var(--accent-light)}
    .w-sub{font-size:11px;color:var(--text-2);margin-top:6px}
    .prog-wrap{margin-top:8px}
    .prog-track{height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin-top:4px}
    .prog-fill{height:100%;border-radius:3px}
    .prog-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text-2)}
    .budget-item{margin-bottom:14px}
    .budget-header{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .budget-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .budget-name{font-size:13px;font-weight:500;flex:1}
    .budget-nums{font-size:12px;color:var(--text-2)}
    .budget-track{height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
    .budget-fill{height:100%;border-radius:3px}
    .over-badge{font-size:10px;background:rgba(225,112,85,0.2);color:var(--red);padding:1px 6px;border-radius:10px;margin-left:4px}
    .section-title{font-size:11px;font-weight:700;color:var(--text-3);
      text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;margin-top:18px}
    .list-item{background:var(--card);border:1px solid var(--border);border-radius:14px;
      padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;
      cursor:pointer;transition:background 0.15s}
    .list-item:active{background:var(--card2)}
    .item-icon{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .item-info{flex:1;min-width:0}
    .item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-sub{font-size:11px;color:var(--text-2);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .item-amount{font-size:16px;font-weight:700;flex-shrink:0}
    .item-amount.exp{color:var(--red)}.item-amount.inc{color:var(--green)}
    .pill{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
    .pill-card{background:rgba(225,112,85,0.15);color:#e17055}
    .pill-cash{background:rgba(108,92,231,0.15);color:var(--accent-light)}
    .pill-pay{background:rgba(0,184,148,0.15);color:var(--green)}
    .pill-next{background:rgba(116,185,255,0.15);color:var(--blue)}
    .type-toggle{display:flex;background:var(--card);border-radius:14px;padding:4px;margin-bottom:16px;margin-top:4px}
    .type-btn{flex:1;padding:10px;border:none;border-radius:10px;background:none;
      color:var(--text-2);font-size:14px;font-weight:600;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all 0.2s}
    .type-btn.on-exp{background:var(--red);color:white}
    .type-btn.on-inc{background:var(--green);color:white}
    .amount-box{background:var(--card);border:2px solid var(--border);border-radius:18px;
      padding:16px 20px;display:flex;align-items:center;margin-bottom:16px;transition:border-color 0.2s}
    .amount-box:focus-within{border-color:var(--accent)}
    .amount-yen{font-size:22px;color:var(--text-2);margin-right:6px}
    .amount-box input{background:none;border:none;color:var(--text);font-size:40px;font-weight:900;
      font-family:'Noto Sans JP',sans-serif;width:100%;outline:none;text-align:right}
    .credit-notice{background:rgba(225,112,85,0.08);border:1px solid rgba(225,112,85,0.25);
      border-radius:12px;padding:12px 14px;font-size:12px;color:#e17055;margin-bottom:14px;display:none}
    .credit-notice.show{display:block}
    .form-group{margin-bottom:16px}
    .form-label{font-size:11px;color:var(--text-2);margin-bottom:8px;display:block;letter-spacing:0.3px}
    .form-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;
      padding:13px 16px;color:var(--text);font-size:15px;font-family:'Noto Sans JP',sans-serif;
      outline:none;transition:border-color 0.2s;-webkit-appearance:none}
    .form-input:focus{border-color:var(--accent)}
    select.form-input{cursor:pointer}
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{padding:7px 12px;border-radius:20px;background:var(--card);border:1px solid var(--border);
      font-size:13px;cursor:pointer;color:var(--text-2);white-space:nowrap;
      font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;gap:5px}
    .chip.sel{background:var(--accent);border-color:var(--accent);color:white}
    .chip.sel-card{background:var(--red);border-color:var(--red);color:white}
    .btn-primary{width:100%;padding:16px;border:none;border-radius:16px;background:var(--accent);
      color:white;font-size:16px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
      cursor:pointer;margin-top:8px;transition:opacity 0.2s}
    .btn-primary:active{opacity:0.8}
    .btn-danger{width:100%;padding:14px;border:none;border-radius:14px;
      background:rgba(225,112,85,0.12);color:var(--red);font-size:15px;font-weight:600;
      font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:10px}
    .btn-add{display:flex;align-items:center;gap:8px;padding:12px 16px;background:none;
      border:1px dashed var(--border);border-radius:14px;color:var(--text-2);font-size:14px;
      font-family:'Noto Sans JP',sans-serif;cursor:pointer;width:100%;margin-top:8px}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:flex-end}
    .modal-overlay.show{display:flex}
    .modal{background:#161928;border-radius:24px 24px 0 0;
      padding:16px 20px calc(24px + var(--safe-b));width:100%;max-height:90vh;overflow-y:auto}
    .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
    .modal-title{font-size:17px;font-weight:700;margin-bottom:20px;text-align:center}
    .bar-chart{display:flex;align-items:flex-end;gap:5px;height:120px;padding:0 4px}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
    .bar-fill{width:100%;border-radius:6px 6px 0 0;min-height:2px}
    .bar-month{font-size:9px;color:var(--text-3)}
    .bar-val{font-size:9px;color:var(--text-2);white-space:nowrap}
    .settings-section{margin-bottom:26px}
    .settings-item{background:var(--card);border:1px solid var(--border);border-radius:14px;
      padding:14px 16px;display:flex;align-items:center;margin-bottom:8px;cursor:pointer}
    .si-info{flex:1;min-width:0}
    .si-name{font-size:14px;font-weight:500}
    .si-sub{font-size:12px;color:var(--text-2);margin-top:2px}
    .empty{text-align:center;padding:48px 20px;color:var(--text-3);font-size:14px}
    .empty .ico{font-size:40px;margin-bottom:12px}
    .more-btn{width:100%;padding:12px;background:none;border:none;color:var(--text-2);
      font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:4px}
    .color-swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent}
    .color-swatch.sel{border-color:white}
    .day-group{margin-bottom:20px}
    .day-label{font-size:12px;color:var(--text-2);font-weight:500;margin-bottom:8px}
    .year-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .year-nav button{background:var(--card);border:1px solid var(--border);border-radius:50%;
      width:38px;height:38px;color:var(--text);font-size:18px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .year-label{font-size:20px;font-weight:700;flex:1;text-align:center}
  </style>
</head>
<body>

  <nav class="nav">

        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>

        <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>

  <div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal-body"></div>

<script>
/* ══════════════════════════════════════
   CONSTANTS
══════════════════════════════════════ */
const CREDIT=['エポス','三井住友','ペイディ'];
const PAYMENTS=['現金','PayPay','エポス','三井住友','ペイディ'];
const DOW=['日','月','火','水','木','金','土'];
const DEFAULT_CATS=[
  {id:'c1',name:'食費',color:'#e17055',emoji:''},
  {id:'c2',name:'外食',color:'#fdcb6e',emoji:''},
  {id:'c3',name:'交通費',color:'#74b9ff',emoji:''},
  {id:'c4',name:'日用品',color:'#a29bfe',emoji:''},
  {id:'c5',name:'光熱費',color:'#55efc4',emoji:''},
  {id:'c6',name:'通信費',color:'#fd79a8',emoji:''},
  {id:'c7',name:'娯楽',color:'#ffeaa7',emoji:''},
  {id:'c8',name:'衣服',color:'#dfe6e9',emoji:''},
  {id:'c9',name:'医療',color:'#b2bec3',emoji:''},
  {id:'c10',name:'美容',color:'#fab1d3',emoji:''},
  {id:'c11',name:'教育',color:'#81ecec',emoji:''},
  {id:'c12',name:'その他',color:'#636e72',emoji:''},
];
const COLORS=[
  '#e17055','#d63031','#ff7675','#e84393','#fd79a8','#fab1d3',
  '#fdcb6e','#f9ca24','#f0932b','#badc58','#6ab04c','#00b894',
  '#55efc4','#81ecec','#00cec9','#74b9ff','#0984e3','#6c5ce7',
  '#a29bfe','#e056fd','#be2edd','#9b59b6','#dfe6e9','#b2bec3',
  '#636e72','#f5f6fa','#718093','#ffeaa7','#c7ecee','#22a6b3',
];

/* ══════════════════════════════════════
   JAPANESE HOLIDAY ENGINE
══════════════════════════════════════ */
const _holidayCache = {};

function getHolidays(year) {
  if (_holidayCache[year]) return _holidayCache[year];
  const h = new Set();

  const ds = (m, d) => `${year}-${pad(m)}-${pad(d)}`;

  // 固定祝日
  h.add(ds(1,1));   // 元日
  h.add(ds(2,11));  // 建国記念の日
  if(year >= 2020) h.add(ds(2,23)); // 天皇誕生日
  else if(year >= 1989) h.add(ds(12,23));
  h.add(ds(4,29));  // 昭和の日
  h.add(ds(5,3));   // 憲法記念日
  h.add(ds(5,4));   // みどりの日
  h.add(ds(5,5));   // こどもの日
  if(year >= 2016) h.add(ds(8,11)); // 山の日
  h.add(ds(11,3));  // 文化の日
  h.add(ds(11,23)); // 勤労感謝の日

  // 第N曜日
  function nthDow(m, n, dow) {
    let cnt = 0;
    for(let d = 1; d <= 31; d++) {
      const dt = new Date(year, m-1, d);
      if(dt.getMonth() !== m-1) break;
      if(dt.getDay() === dow && ++cnt === n) return ds(m, d);
    }
    return null;
  }

  // 成人の日: 1月第2月曜
  const add = s => { if(s) h.add(s); };
  if(year >= 2000) add(nthDow(1,2,1)); else h.add(ds(1,15));
  // 海の日: 7月第3月曜
  if(year >= 2003) add(nthDow(7,3,1)); else h.add(ds(7,20));
  // 敬老の日: 9月第3月曜
  if(year >= 2003) add(nthDow(9,3,1)); else h.add(ds(9,15));
  // スポーツの日: 10月第2月曜
  if(year >= 2000) add(nthDow(10,2,1)); else h.add(ds(10,10));

  // 春分の日（近似式）
  const sp = Math.floor(20.8431 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  h.add(ds(3, sp));
  // 秋分の日（近似式）
  const au = Math.floor(23.2488 + 0.242194*(year-1980) - Math.floor((year-1980)/4));
  h.add(ds(9, au));

  // 振替休日: 日曜祝日 → 翌月曜（それも祝日なら更に翌日）
  const snap = new Set(h);
  const toAdd = [];
  for(const s of snap) {
    const dt = new Date(s);
    if(dt.getDay() === 0) {
      let nd = new Date(dt); nd.setDate(nd.getDate()+1);
      while(snap.has(dstr(nd)) || toAdd.includes(dstr(nd))) nd.setDate(nd.getDate()+1);
      toAdd.push(dstr(nd));
    }
  }
  toAdd.forEach(s => h.add(s));

  // 国民の休日: 2つの祝日に挟まれた平日
  const allDays = [];
  for(let m=1;m<=12;m++) for(let d=1;d<=31;d++) {
    const dt=new Date(year,m-1,d);
    if(dt.getMonth()!==m-1) break;
    allDays.push(dstr(dt));
  }
  for(let i=1;i<allDays.length-1;i++) {
    const prev=allDays[i-1],curr=allDays[i],next=allDays[i+1];
    if(!h.has(curr) && new Date(curr).getDay()!==0 && h.has(prev) && h.has(next)) h.add(curr);
  }

  _holidayCache[year] = h;
  return h;
}

function dstr(dt) {
  return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;
}

// 翌営業日（土日祝 → 次の平日）
function nextBizDay(year, month, day) {
  const holidays = getHolidays(year);
  let dt = new Date(year, month-1, day);
  while(dt.getDay()===0 || dt.getDay()===6 || holidays.has(dstr(dt))) {
    dt.setDate(dt.getDate()+1);
  }
  return dstr(dt);
}

// クレカの実際の引き落とし日（25日が土日祝なら翌営業日）
function creditPayDate(accountingYM) {
  const [y, m] = accountingYM.split('-').map(Number);
  return nextBizDay(y, m, 25);
}

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
const isCredit = p => CREDIT.includes(p);
const fmt = n => Math.abs(Math.round(n)).toLocaleString('ja-JP');
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const pad = n => String(n).padStart(2,'0');
const today = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const curMonth = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}`; };
const ymOf = s => s.slice(0,7);
const monthLabel = s => { const [y,m]=s.split('-'); return `${y}年${Number(m)}月`; };
const shortMonth = s => Number(s.split('-')[1])+'月';
const dayOfWeek = s => DOW[new Date(s).getDay()];
const addMonths = (s,n) => {
  const [y,m]=s.split('-').map(Number);
  const d=new Date(y,m-1+n,1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
};

// 締め日24日: 1〜24日→翌月、25日以降→翌々月計上
const accountingMonth = (dateStr, payment) => {
  const [y,m,d] = dateStr.split('-').map(Number);
  if(isCredit(payment)) {
    const offset = d >= 25 ? 2 : 1;
    const dt = new Date(y, m-1+offset, 1);
    return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}`;
  }
  return `${y}-${pad(m)}`;
};

const purchaseMonth = dateStr => ymOf(dateStr);

  fixed(){return this._g('kk_fixed',[])},  saveFixed(v){this._s('kk_fixed',v)},
  salaries(){return this._g('kk_sal',[])}, saveSalaries(v){this._s('kk_sal',v)},
  cats(){return this._g('kk_cats',DEFAULT_CATS)}, saveCats(v){this._s('kk_cats',v)},
  budgets(){return this._g('kk_budgets',{})}, saveBudgets(v){this._s('kk_budgets',v)},
  config(){return this._g('kk_config',{savingsGoal:0})}, saveConfig(v){this._s('kk_config',v)},
  balances(){return this._g('kk_balances',{})}, saveBalances(v){this._s('kk_balances',v)},
  exportAll(){return{tx:this.txs(),fixed:this.fixed(),salaries:this.salaries(),
    cats:this.cats(),budgets:this.budgets(),config:this.config(),balances:this.balances()}},
  importAll(o){

    if(o.salaries)this.saveSalaries(o.salaries); if(o.cats)this.saveCats(o.cats);
    if(o.budgets)this.saveBudgets(o.budgets); if(o.config)this.saveConfig(o.config);
    if(o.balances)this.saveBalances(o.balances);
  },
};

// 現金主義（口座から出ていくお金）
function summaryOut(m) {
  let creditExp=0, directExp=0, fixedExp=0, salaryInc=0, manualInc=0, catMap={};
  for(const t of db.txs()) {
    if(t.accountingMonth!==m) continue;
    if(t.type==='income'){manualInc+=t.amount;continue}
    if(isCredit(t.payment)) creditExp+=t.amount;
    else directExp+=t.amount;
    catMap[t.category]=(catMap[t.category]||0)+t.amount;
  }
  for(const f of db.fixed())   { if(!f.startMonth||m>=f.startMonth){ fixedExp+=f.amount; catMap[f.category]=(catMap[f.category]||0)+f.amount; } }
  for(const s of db.salaries()){ if(!s.startMonth||m>=s.startMonth){salaryInc+=s.amount;} }
  return {creditExp,directExp,fixedExp,salaryInc,manualInc,
    totalIncome:manualInc+salaryInc, totalOut:creditExp+directExp+fixedExp, catMap};
}

// 購買主義（今月実際に使った金額・使用日ベース）
function summarySpent(m) {
  let total=0, catMap={};
  for(const t of db.txs()) {
    if(t.type==='income') continue;
    if(purchaseMonth(t.date)!==m) continue;
    total+=t.amount;
    catMap[t.category]=(catMap[t.category]||0)+t.amount;
  }
  for(const f of db.fixed()) {
    if(!f.startMonth||m>=f.startMonth){
      total+=f.amount;
      catMap[f.category]=(catMap[f.category]||0)+f.amount;
    }
  }
  return {total,catMap};
}

// 来月クレカ予告（今月使ったクレカ）
function nextPreview(m) {
  return db.txs().filter(t=>t.type==='expense'&&isCredit(t.payment)&&purchaseMonth(t.date)===m)
    .reduce((s,t)=>s+t.amount,0);
}

/* ══════════════════════════════════════
   DETAIL MODAL（ホームカードタップ時）
══════════════════════════════════════ */
function showDetailModal(mode, m) {
  const cats = db.cats();
  const activFixed = db.fixed().filter(f=>!f.startMonth||m>=f.startMonth);
  const activSal = db.salaries().filter(s=>!s.startMonth||m>=s.startMonth);

  let items = '';

  if(mode==='out') {
    // 口座出金ベース：現金・PayPay（支払月）＋クレカ集計（先月分）＋固定費
    const directTxs = db.txs().filter(t=>
      t.type==='expense' && !isCredit(t.payment) && t.accountingMonth===m
    ).sort((a,b)=>b.date.localeCompare(a.date));

    // クレカ集計（支払月ベース）
    const creditMap = {};
    for(const t of db.txs()){
      if(t.type==='income'||!isCredit(t.payment)) continue;
      if(t.accountingMonth!==m) continue;
      if(!creditMap[t.payment]) creditMap[t.payment]=[];
      creditMap[t.payment].push(t);
    }

    // 収入
    if(activSal.length>0){
      items += `<div class="section-title">給与・収入</div>`;
      items += activSal.map(s=>{
        const [sy,sm]=m.split('-').map(Number);
        const payD=nextBizDay(sy,sm,s.day);
        return`<div class="list-item" style="cursor:default">
          <div class="item-icon" style="background:rgba(0,184,148,0.15)"><div style="width:14px;height:14px;border-radius:50%;background:var(--green)"></div></div>
          <div class="item-info"><div class="item-name">${s.name}</div><div class="item-sub">${payD.slice(5).replace('-','/')}（${dayOfWeek(payD)}）</div></div>
          <div class="item-amount inc">+¥${fmt(s.amount)}</div>
        </div>`;
      }).join('');
      const manualInc = db.txs().filter(t=>t.type==='income'&&t.accountingMonth===m);
      items += manualInc.map(t=>txItem(t,cats)).join('');
    }

    // クレカ明細（カード別）
    if(Object.keys(creditMap).length>0){
      for(const [card, txs] of Object.entries(creditMap)){
        const total = txs.reduce((s,t)=>s+t.amount,0);
        const payD = creditPayDate(m);
        items += `<div class="section-title">💳 ${card}（${payD.slice(5).replace('-','/')}引き落とし） ¥${fmt(total)}</div>`;
        items += txs.sort((a,b)=>b.date.localeCompare(a.date)).map(t=>txItem(t,cats)).join('');
      }
    }

    // 固定費
    if(activFixed.length>0){
      items += `<div class="section-title">固定費</div>`;
      items += activFixed.map(f=>{
        const cat=cats.find(c=>c.id===f.category);
        const [fy,fm]=m.split('-').map(Number);
        const payD=nextBizDay(fy,fm,f.day);
        return`<div class="list-item" style="cursor:default">
          <div class="item-icon" style="background:${cat?cat.color+'22':'#ffffff11'}"><div style="width:14px;height:14px;border-radius:50%;background:${cat?cat.color:'#636e72'}"></div></div>
          <div class="item-info"><div class="item-name">${f.name}</div><div class="item-sub">${payD.slice(5).replace('-','/')}（${dayOfWeek(payD)}） <span class="pill pill-cash">${f.payment||'口座振替'}</span></div></div>
          <div class="item-amount exp">-¥${fmt(f.amount)}</div>
        </div>`;
      }).join('');
    }

    // 現金・PayPay
    if(directTxs.length>0){
      items += `<div class="section-title">現金・PayPay</div>`;
      items += directTxs.map(t=>txItem(t,cats)).join('');
    }

    if(!items) items = '<div class="empty"><div class="ico">📭</div>明細がありません</div>';
    showModal(`<div class="modal-handle"></div><div class="modal-title">今月 口座から出ていくお金</div>${items}<div style="height:8px"></div>`);

  } else {
    // 購買主義：今月使用日ベースの全明細
    const spentTxs = db.txs().filter(t=>
      t.type==='expense' && ymOf(t.date)===m
    ).sort((a,b)=>b.date.localeCompare(a.date));

    if(activFixed.length>0){
      items += `<div class="section-title">固定費</div>`;
      items += activFixed.map(f=>{
        const cat=cats.find(c=>c.id===f.category);
        const [fy,fm]=m.split('-').map(Number);
        const payD=nextBizDay(fy,fm,f.day);
        return`<div class="list-item" style="cursor:default">
          <div class="item-icon" style="background:${cat?cat.color+'22':'#ffffff11'}"><div style="width:14px;height:14px;border-radius:50%;background:${cat?cat.color:'#636e72'}"></div></div>
          <div class="item-info"><div class="item-name">${f.name}</div><div class="item-sub">${payD.slice(5).replace('-','/')}（${dayOfWeek(payD)}）</div></div>
          <div class="item-amount exp">-¥${fmt(f.amount)}</div>
        </div>`;
      }).join('');
    }

    // 日付でグループ
    const groups={};
    for(const t of spentTxs){if(!groups[t.date])groups[t.date]=[];groups[t.date].push(t);}
    items += Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(date=>`
      <div class="day-group">
        <div class="day-label">${date.slice(5).replace('-','/')}（${dayOfWeek(date)}）</div>
        ${groups[date].map(t=>txItem(t,cats)).join('')}
      </div>`).join('');

    if(!items) items = '<div class="empty"><div class="ico">📭</div>明細がありません</div>';
    showModal(`<div class="modal-handle"></div><div class="modal-title">今月 実際に使った金額</div>${items}<div style="height:8px"></div>`);
  }
}


function buildPie(catMap, cats, _ignored) {
  const total = Object.values(catMap).reduce((s,v)=>s+v, 0);
  if(!total || total === 0) return '<div style="text-align:center;color:var(--text-3);padding:24px;font-size:13px">データがありません</div>';

  // Sort by amount desc, take top 8, rest → その他
  const entries = cats.filter(c=>catMap[c.id]>0)
    .map(c=>({name:c.name,color:c.color,amount:catMap[c.id]||0}))
    .sort((a,b)=>b.amount-a.amount);

  const top = entries.slice(0,8);
  const rest = entries.slice(8).reduce((s,e)=>s+e.amount,0);
  if(rest>0) top.push({name:'その他',color:'#636e72',amount:rest});

  // SVG pie
  const cx=80, cy=80, r=70, gap=0.02;
  let angle=-Math.PI/2;
  let slices='';
  for(const e of top) {
    const pct=e.amount/total;
    const sweep=pct*Math.PI*2-gap;
    if(sweep<=0) continue;
    const x1=cx+r*Math.cos(angle);
    const y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+sweep);
    const y2=cy+r*Math.sin(angle+sweep);
    const large=sweep>Math.PI?1:0;
    slices+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${e.color}" opacity="0.9"/>`;
    angle+=pct*Math.PI*2;
  }

  // Legend
  const legend = top.map(e=>{
    const pct=Math.round(e.amount/total*100);
    return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
      <div style="width:10px;height:10px;border-radius:50%;background:${e.color};flex-shrink:0"></div>
      <div style="flex:1;font-size:12px;color:var(--text)">${e.name}</div>
      <div style="font-size:12px;font-weight:700;color:var(--text-2)">${pct}%</div>
      <div style="font-size:12px;font-weight:700;color:var(--text);min-width:70px;text-align:right">¥${fmt(e.amount)}</div>
    </div>`;
  }).join('');

  return`<div style="display:flex;gap:16px;align-items:flex-start">
    <svg viewBox="0 0 160 160" width="140" height="140" style="flex-shrink:0">
      ${slices}
      <circle cx="${cx}" cy="${cy}" r="32" fill="#1e2235"/>
      <text x="${cx}" y="${cy-6}" fill="#8892aa" font-size="9" text-anchor="middle" font-family="sans-serif">合計</text>
      <text x="${cx}" y="${cy+8}" fill="#f0f0fa" font-size="10" font-weight="bold" text-anchor="middle" font-family="sans-serif">¥${total>=10000?Math.round(total/10000)+'万':fmt(total)}</text>
    </svg>
    <div style="flex:1;padding-top:4px">${legend}</div>
  </div>`;
}

/* ══════════════════════════════════════
   ANNUAL SUMMARY
   固定費・給与は開始月〜今月の実績分のみ計上
══════════════════════════════════════ */
function annualSummary(year) {
  const cur = curMonth();
  const months = Array.from({length:12},(_,i)=>`${year}-${pad(i+1)}`);

  // 各月の手動明細集計（月のaccountingMonthベース）
  const txTotals = {}; // {ym: {exp, inc}}
  for(const t of db.txs()) {
    const ym = t.accountingMonth;
    if(!ym.startsWith(String(year))) continue;
    if(!txTotals[ym]) txTotals[ym]={exp:0,inc:0};
    if(t.type==='income') txTotals[ym].inc+=t.amount;
    else txTotals[ym].exp+=t.amount;
  }

  // 固定費・給与：startMonth〜min(cur,年末) の分のみ
  const effectiveEnd = cur < `${year}-12` ? cur : `${year}-12`;

  let fixedTotal=0, salaryTotal=0;
  for(const f of db.fixed()) {
    const start = f.startMonth || '2000-01';
    const from = start > `${year}-01` ? start : `${year}-01`;
    const to = effectiveEnd;
    if(from > to) continue;
    let count=0, m=from;
    while(m<=to){count++;m=addMonths(m,1);}
    fixedTotal += f.amount * count;
  }
  for(const s of db.salaries()) {
    const start = s.startMonth || '2000-01';
    const from = start > `${year}-01` ? start : `${year}-01`;
    const to = effectiveEnd;
    if(from > to) continue;
    let count=0, m=from;
    while(m<=to){count++;m=addMonths(m,1);}
    salaryTotal += s.amount * count;
  }

  // 月別の手動出金（グラフ用）
  const monthlyOut = months.map(m => {
    const tx = txTotals[m]||{exp:0,inc:0};
    // 固定費は cur 以前の月だけ加算
    let fixedM=0;
    if(m<=cur) {
      for(const f of db.fixed()){if(!f.startMonth||m>=f.startMonth)fixedM+=f.amount;}
    }
    return tx.exp + fixedM;
  });

  const totalTxExp = months.reduce((s,m)=>(txTotals[m]?s+txTotals[m].exp:s),0);
  const totalTxInc = months.reduce((s,m)=>(txTotals[m]?s+txTotals[m].inc:s),0);
  const yearOut = totalTxExp + fixedTotal;
  const yearInc = totalTxInc + salaryTotal;

  // カテゴリ別（口座出金ベース、実績のみ）
  const catMap = {};
  for(const t of db.txs()) {
    if(!t.accountingMonth.startsWith(String(year))) continue;
    if(t.type==='income') continue;
    catMap[t.category]=(catMap[t.category]||0)+t.amount;
  }
  // 固定費もカテゴリに加算（実績月数分）
  for(const f of db.fixed()) {
    const start = f.startMonth||'2000-01';
    const from = start>`${year}-01`?start:`${year}-01`;
    const to = effectiveEnd;
    if(from>to) continue;
    let count=0,m=from;
    while(m<=to){count++;m=addMonths(m,1);}
    catMap[f.category]=(catMap[f.category]||0)+f.amount*count;
  }

  return {yearOut, yearInc, monthlyOut, catMap, months, effectiveEnd};
}

/* ══════════════════════════════════════
   TX ITEM
══════════════════════════════════════ */
function txItem(t,cats){
  const cat=cats.find(c=>c.id===t.category);
  const isInc=t.type==='income';
  let pill='';
  if(!isInc){
    if(isCredit(t.payment)) pill=`<span class="pill pill-card">${t.payment}</span>`;
    else if(t.payment==='PayPay') pill=`<span class="pill pill-pay">PayPay</span>`;
    else pill=`<span class="pill pill-cash">現金</span>`;
  }
  const dd=t.date.slice(5).replace('-','/');
  let accNote='';
  if(!isInc&&isCredit(t.payment)){
    const pm=purchaseMonth(t.date);
    if(pm!==t.accountingMonth) accNote=`<span class="pill pill-next">${monthLabel(t.accountingMonth)}払い</span>`;
  }
  return`<div class="list-item" onclick="editTx('${t.id}')">
    <div class="item-icon" style="background:${cat?cat.color+'22':'#ffffff11'}">
      <div style="width:14px;height:14px;border-radius:50%;background:${cat?cat.color:'#636e72'}"></div>
    </div>
    <div class="item-info">
      <div class="item-name">${isInc?'収入：':cat?cat.name:'その他'}${t.memo?' · '+t.memo:''}</div>
      <div class="item-sub">${dd}（${dayOfWeek(t.date)}） ${pill} ${accNote}</div>
    </div>
    <div class="item-amount ${isInc?'inc':'exp'}">${isInc?'+':'-'}¥${fmt(t.amount)}</div>
  </div>`;
}

    const payDisp=payD?`（${payD.slice(5).replace('-','/')}（${dayOfWeek(payD)}）引き落とし）`:'';
    accPreview=`<div style="font-size:12px;color:var(--text-2);margin-top:8px;text-align:center">

  }
  document.getElementById('add-body').innerHTML=`

    <div class="type-toggle">
      <button class="type-btn ${f.type==='expense'?'on-exp':''}" onclick="setType('expense')">支出</button>
      <button class="type-btn ${f.type==='income'?'on-inc':''}" onclick="setType('income')">収入</button>

      <input type="number" id="inp-amount" value="${f.amount}" placeholder="0" inputmode="decimal"

    </div>
    ${f.type==='expense'?`
    <div class="form-group">
      <label class="form-label">支払い方法</label>
      <div class="chips">${PAYMENTS.map(p=>`<div class="chip ${f.payment===p?(isCredit(p)?'sel-card':'sel'):''}" onclick="setPay('${p}')">${p}</div>`).join('')}</div>
    </div>
    ${accPreview}`:''}
    <div class="form-group">
      <label class="form-label">カテゴリ</label>
      <div class="chips">${cats.map(c=>`<div class="chip ${f.cat===c.id?'sel':''}" onclick="setCat('${c.id}')" style="${f.cat===c.id?`background:${c.color};border-color:${c.color}`:''}"><span style="width:10px;height:10px;border-radius:50%;background:${c.color};display:inline-block;flex-shrink:0"></span>${c.name}</div>`).join('')}</div>
    </div>
    <div class="form-group">
      <label class="form-label">日付</label>
      <input type="date" class="form-input" value="${f.date}" onchange="S.form.date=this.value;renderAdd()">
    </div>
    <div class="form-group">
      <label class="form-label">メモ（任意）</label>
      <input type="text" class="form-input" placeholder="お店名など" value="${f.memo}" oninput="S.form.memo=this.value">
    </div>
    <button class="btn-primary" onclick="saveTx()">${isEdit?'更新する':'保存する'}</button>
    ${isEdit?`<button class="btn-danger" onclick="deleteTx('${f.editId}')">削除する</button>`:''}
    <div style="height:16px"></div>
  `;
  document.getElementById('inp-amount')?.focus();
}
function setType(t){S.form.type=t;if(t==='income')S.form.payment='現金';renderAdd();}
function setPay(p){S.form.payment=p;renderAdd();}
function setCat(id){S.form.cat=id;renderAdd();}
function saveTx(){
  const f=S.form;
  const amount=parseFloat(f.amount);
  if(!amount||amount<=0){alert('金額を入力してください');return;}
  if(!f.cat){alert('カテゴリを選択してください');return;}
  const payment=f.type==='income'?'収入':f.payment;
  const accMonth=f.type==='income'?ymOf(f.date):accountingMonth(f.date,f.payment);
  const txs=db.txs();
  if(f.editId){
    const i=txs.findIndex(t=>t.id===f.editId);
    if(i>=0) txs[i]={...txs[i],amount,category:f.cat,payment,date:f.date,memo:f.memo,accountingMonth:accMonth,type:f.type};
  }else{
    txs.push({id:uid(),amount,category:f.cat,payment,date:f.date,memo:f.memo,accountingMonth:accMonth,type:f.type});
  }
  db.saveTx(txs); S.form=freshForm(); S.homeMonth=accMonth; go('home');
}
function editTx(id){
  const t=db.txs().find(t=>t.id===id);if(!t)return;
  S.form={type:t.type,amount:String(t.amount),cat:t.category,payment:t.payment==='収入'?'現金':t.payment,date:t.date,memo:t.memo||'',editId:id};
  go('add');
}
function deleteTx(id){
  if(!confirm('この明細を削除しますか？'))return;
  db.saveTx(db.txs().filter(t=>t.id!==id)); S.form=freshForm(); go('home');
}

/* ══════════════════════════════════════
   HISTORY
══════════════════════════════════════ */
function renderHistory(){
  const m=S.histMonth;
  const cats=db.cats();
  const cur=curMonth();
  const activFixed=db.fixed().filter(f=>!f.startMonth||m>=f.startMonth);
  const activSal=db.salaries().filter(s=>!s.startMonth||m>=s.startMonth);

  // 表示する明細：
  // クレカ → 使用月（purchaseMonth）で表示
  // 現金・PayPay・収入 → 支払月（accountingMonth）で表示
  const txs = db.txs().filter(t => {
    if(t.type==='income') return t.accountingMonth===m;
    if(isCredit(t.payment)) return ymOf(t.date)===m; // 使用月
    return t.accountingMonth===m; // 現金・PayPay
  }).sort((a,b)=>b.date.localeCompare(a.date));

  // 支払月に届くクレカ集計（先月以前に使ったもので今月が支払月）
  const creditSummaries = {};
  for(const t of db.txs()){
    if(t.type==='income') continue;
    if(!isCredit(t.payment)) continue;
    if(t.accountingMonth!==m) continue;      // この月が支払月
    if(ymOf(t.date)===m) continue;           // 同月使用は除外（上で表示済み）
    if(!creditSummaries[t.payment]) creditSummaries[t.payment]=0;
    creditSummaries[t.payment]+=t.amount;
  }

  const groups={};
  for(const t of txs){if(!groups[t.date])groups[t.date]=[];groups[t.date].push(t);}

  const totalExp = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0)
    + activFixed.reduce((s,f)=>s+f.amount,0)
    + Object.values(creditSummaries).reduce((s,v)=>s+v,0);
  const totalInc = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0)
    + activSal.reduce((s,sl)=>s+sl.amount,0);

  // クレカ支払い集計行HTML
  const creditSummaryHtml = Object.entries(creditSummaries).map(([card, amount])=>{
    const payD = creditPayDate(m);
    return`<div class="list-item" style="cursor:default;border-color:rgba(225,112,85,0.3)">
      <div class="item-icon" style="background:rgba(225,112,85,0.12)">
        <div style="width:14px;height:14px;border-radius:50%;background:var(--red)"></div>
      </div>
      <div class="item-info">
        <div class="item-name">💳 ${card}（先月分引き落とし）</div>
        <div class="item-sub">${payD.slice(5).replace('-','/')}（${dayOfWeek(payD)}）<span class="pill pill-card">${card}</span></div>
      </div>
      <div class="item-amount exp">-¥${fmt(amount)}</div>
    </div>`;
  }).join('');

  document.getElementById('history-body').innerHTML=`
    <div class="page-header"><div class="page-title">明細</div></div>
    <div class="month-nav">
      <button onclick="S.histMonth=addMonths(S.histMonth,-1);renderHistory()">‹</button>
      <div class="month-label">${monthLabel(m)}</div>
      <button onclick="S.histMonth=addMonths(S.histMonth,1);renderHistory()">›</button>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:16px">
      <div class="widget" style="flex:1"><div class="w-label">支出合計</div><div class="w-amount red">¥${fmt(totalExp)}</div></div>
      <div class="widget" style="flex:1"><div class="w-label">収入合計</div><div class="w-amount green">¥${fmt(totalInc)}</div></div>
    </div>

    ${activSal.length>0?`<div class="section-title">毎月の給与</div>${activSal.map(s=>{
      const [sy,sm]=m.split('-').map(Number);
      const payD=nextBizDay(sy,sm,s.day);
      return`<div class="list-item" onclick="showSalaryModal(${JSON.stringify(s).replace(/"/g,'&quot;')})">
        <div class="item-icon" style="background:rgba(0,184,148,0.15)">
          <div style="width:14px;height:14px;border-radius:50%;background:var(--green)"></div>
        </div>
        <div class="item-info"><div class="item-name">${s.name}</div>
          <div class="item-sub">${payD.slice(5).replace('-','/')}（${dayOfWeek(payD)}）入金</div>
        </div>
        <div class="item-amount inc">+¥${fmt(s.amount)}</div>
      </div>`;
    }).join('')}`:''}

    ${activFixed.length>0?`<div class="section-title">固定費（毎月）</div>${activFixed.map(f=>{
      const cat=cats.find(c=>c.id===f.category);
      const [fy,fm]=m.split('-').map(Number);
      const payD=nextBizDay(fy,fm,f.day);
      return`<div class="list-item" onclick="showFixedModal(${JSON.stringify(f).replace(/"/g,'&quot;')})">
        <div class="item-icon" style="background:${cat?cat.color+'22':'#ffffff11'}">
          <div style="width:14px;height:14px;border-radius:50%;background:${cat?cat.color:'#636e72'}"></div>
        </div>
        <div class="item-info"><div class="item-name">${f.name}</div>
          <div class="item-sub">${payD.slice(5).replace('-','/')}（${dayOfWeek(payD)}） <span class="pill pill-cash">${f.payment||'口座振替'}</span></div>
        </div>
        <div class="item-amount exp">-¥${fmt(f.amount)}</div>
      </div>`;
    }).join('')}`:''}

    ${Object.keys(creditSummaries).length>0?`<div class="section-title">クレカ引き落とし（先月分）</div>${creditSummaryHtml}`:''}

    ${Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(date=>`
      <div class="day-group">
        <div class="day-label">${date.slice(5).replace('-','/')}（${dayOfWeek(date)}）</div>
        ${groups[date].map(t=>txItem(t,cats)).join('')}
      </div>`).join('')}

    ${txs.length===0&&activFixed.length===0&&Object.keys(creditSummaries).length===0
      ?`<div class="empty"><div class="ico">📭</div>この月の明細はありません</div>`:''}
  `;
}

  const year=S.annualYear;
  const {yearOut,yearInc,monthlyOut,catMap,months,effectiveEnd}=annualSummary(year);
  const cats=db.cats();
  const maxVal=Math.max(...monthlyOut,1);
  const avgMonthly=Math.round(yearOut/Math.max(1,months.filter(m=>m<=effectiveEnd).length));
  const cur=curMonth();

  document.getElementById('annual-body').innerHTML=`
    <div class="page-header"><div class="page-title">年間</div></div>
    <div class="year-nav">
      <button onclick="if(S.annualYear>2020)S.annualYear--;renderAnnual()">‹</button>
      <div class="year-label">${year}年</div>
      <button onclick="if(S.annualYear<2050)S.annualYear++;renderAnnual()">›</button>
    </div>
    <div style="font-size:11px;color:var(--text-2);text-align:center;margin-bottom:12px;background:var(--card);padding:8px;border-radius:10px">
      集計対象：固定費・給与は開始月〜${monthLabel(effectiveEnd)}の実績分のみ
    </div>

    <div class="widget-row" style="margin-bottom:10px">
      <div class="widget"><div class="w-label">年間支出合計<br>（実績ベース）</div><div class="w-amount red" style="font-size:18px">¥${fmt(yearOut)}</div></div>
      <div class="widget"><div class="w-label">実績月平均</div><div class="w-amount" style="font-size:18px">¥${fmt(avgMonthly)}</div></div>
    </div>
    ${yearInc>0?`<div class="widget wide green" style="margin-bottom:10px">
      <div class="w-label">年間収支（実績ベース）</div>
      <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
        <span style="font-size:18px;font-weight:900;color:var(--green)">+¥${fmt(yearInc)}</span>
        <span style="color:var(--text-3)">−</span>
        <span style="font-size:18px;font-weight:900;color:var(--red)">¥${fmt(yearOut)}</span>
        <span style="color:var(--text-3)">=</span>
        <span style="font-size:18px;font-weight:900;color:${yearInc-yearOut>=0?'var(--green)':'var(--red)'}">
          ${yearInc-yearOut>=0?'貯金':'赤字'} ¥${fmt(Math.abs(yearInc-yearOut))}
        </span>
      </div>
    </div>`:''}

    <div class="section-title">月別支出グラフ</div>
    <div class="widget wide" style="padding:20px 12px 12px">
      <div class="bar-chart">
        ${months.map((m,i)=>{
          const isFuture=m>cur;
          const h=monthlyOut[i]>0?Math.max(8,Math.round(monthlyOut[i]/maxVal*100)):2;
          const isNow=m===cur;
          const label=monthlyOut[i]>0?(monthlyOut[i]>=10000?Math.round(monthlyOut[i]/10000)+'万':fmt(monthlyOut[i])):'';
          return`<div class="bar-col" onclick="S.histMonth='${m}';go('history')">
            <div class="bar-val" style="color:${isFuture?'var(--text-3)':'var(--text-2)'}">${label}</div>
            <div class="bar-fill" style="height:${h}px;background:${isFuture?'rgba(255,255,255,0.08)':isNow?'var(--accent-light)':'rgba(108,92,231,0.45)'}"></div>
            <div class="bar-month" style="color:${isNow?'var(--accent-light)':'var(--text-3)'}">${shortMonth(m)}</div>
          </div>`;
        }).join('')}
      </div>
      <div style="font-size:10px;color:var(--text-3);text-align:center;margin-top:8px">グレーは未来の月（固定費未計上）・タップで明細</div>
    </div>

    <div class="section-title">カテゴリ別（年間・実績ベース）</div>
    <div class="widget wide" style="padding:18px 16px">
      ${cats.filter(c=>catMap[c.id]).sort((a,b)=>(catMap[b.id]||0)-(catMap[a.id]||0)).map(c=>{
        const amt=catMap[c.id]||0;
        const pct=yearOut>0?Math.round(amt/yearOut*100):0;
        return`<div class="budget-item">
          <div class="budget-header">
            <div class="budget-dot" style="background:${c.color}"></div>
            <div class="budget-name">${c.name}</div>
            <div class="budget-nums">¥${fmt(amt)} (${pct}%)</div>
          </div>
          <div class="budget-track"><div class="budget-fill" style="width:${pct}%;background:${c.color}"></div></div>
        </div>`;

      ${Object.keys(catMap).length===0?'<div style="color:var(--text-3);font-size:13px;text-align:center;padding:16px">データがありません</div>':''}
    </div>

      <div class="section-title">クレジットカード</div>
      ${CREDIT.map(c=>`<div class="settings-item" style="cursor:default">
        <div class="si-info">
          <div class="si-name">💳 ${c}</div>
          <div class="si-sub">締め日24日 · 25日払い（土日祝は翌営業日）· 24日以前→翌月 · 25日以降→翌々月</div>
        </div>
      </div>`).join('')}
    </div>

    <div class="settings-section">
      <div class="section-title">データ管理</div>
      <div class="settings-item" onclick="exportData()">
        <div class="si-info"><div class="si-name">📤 データをエクスポート</div><div class="si-sub">JSONファイルとして保存</div></div>
      </div>
      <div class="settings-item" onclick="document.getElementById('import-input').click()">
        <div class="si-info"><div class="si-name">📥 データをインポート</div><div class="si-sub">エクスポートしたJSONを読み込む</div></div>
      </div>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">

    <div style="text-align:center;color:var(--text-3);font-size:12px;padding:4px 0 24px">
      データはこのデバイスのブラウザに保存されます
    </div>
  `;
}

/* ══════════════════════════════════════
   EXPORT / IMPORT
══════════════════════════════════════ */
function exportData(){
  const data=db.exportAll();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url; a.download=`kakeibo_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`;
  a.click(); URL.revokeObjectURL(url);
}
function importData(e){
  const file=e.target.files[0]; if(!file)return;
  if(!confirm('現在のデータをインポートしたデータで上書きします。よろしいですか？'))return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      db.importAll(JSON.parse(ev.target.result));
      alert('インポートが完了しました！');
      S.homeMonth=curMonth(); renderAll();
    }catch{alert('ファイルの読み込みに失敗しました。');}
  };
  reader.readAsText(file); e.target.value='';
}

/* ══════════════════════════════════════
   MODAL HELPERS
══════════════════════════════════════ */
function showModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-overlay').classList.add('show');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}

// 月選択: 2020年1月〜2050年12月
function monthOptions(selected){
  const opts=[];
  for(let y=2050;y>=2020;y--) for(let m=12;m>=1;m--) {
    const v=`${y}-${pad(m)}`;
    opts.push(`<option value="${v}" ${selected===v?'selected':''}>${y}年${m}月</option>`);
  }
  return opts.join('');
}

/* ══════════════════════════════════════
   SALARY MODAL
══════════════════════════════════════ */
function showSalaryModal(s){
  s=s||{id:null,name:'',amount:'',day:25,startMonth:curMonth()};
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">${s.id?'給与を編集':'給与を追加'}</div>
    <div class="form-group"><label class="form-label">名前</label>
      <input type="text" class="form-input" id="sal-name" value="${s.name}" placeholder="給与、副収入など"></div>
    <div class="form-group"><label class="form-label">金額（円）</label>
      <input type="number" class="form-input" id="sal-amount" value="${s.amount}" placeholder="0" inputmode="decimal"></div>
    <div class="form-group"><label class="form-label">毎月の入金日</label>
      <input type="number" class="form-input" id="sal-day" value="${s.day}" min="1" max="31"></div>
    <div class="form-group"><label class="form-label">開始月</label>
      <select class="form-input" id="sal-start">${monthOptions(s.startMonth)}</select></div>

    ${s.id?`<button class="btn-danger" onclick="deleteSalary('${s.id}')">削除する</button>`:''}
  `);
}
function saveSalary(id){
  const name=document.getElementById('sal-name').value.trim();
  const amount=parseFloat(document.getElementById('sal-amount').value);
  const day=parseInt(document.getElementById('sal-day').value)||25;
  const startMonth=document.getElementById('sal-start').value;
  if(!name||!amount){alert('名前と金額を入力してください');return;}
  const salaries=db.salaries();
  if(id){const i=salaries.findIndex(s=>s.id===id);if(i>=0)salaries[i]={id,name,amount,day,startMonth};}
  else salaries.push({id:uid(),name,amount,day,startMonth});
  db.saveSalaries(salaries); closeModal(); renderSettings(); renderHome();
}
function deleteSalary(id){
  if(!confirm('この給与設定を削除しますか？'))return;
  db.saveSalaries(db.salaries().filter(s=>s.id!==id)); closeModal(); renderSettings(); renderHome();
}

/* ══════════════════════════════════════

══════════════════════════════════════ */
function showBalanceModal(m){
  const cur=db.balances()[m]??'';
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">${monthLabel(m)} 月初残高</div>
    <div class="form-group"><label class="form-label">口座残高（円）</label>
      <input type="number" class="form-input" id="bal-inp" value="${cur}" placeholder="例：350000" inputmode="decimal"></div>

function saveBalance(m){

function deleteBalance(m){
  const b=db.balances(); delete b[m]; db.saveBalances(b); closeModal(); renderHome();
}

function showBudgetModal(catId){
  const cat=db.cats().find(c=>c.id===catId);
  const cur=db.budgets()[catId]||'';
  showModal(`

    <div class="modal-title">${cat?.name} の月次予算</div>

      <input type="number" class="form-input" id="bgt-inp" value="${cur}" placeholder="例：30000" inputmode="decimal"></div>

  `);
}
function saveBudget(catId){
  const v=parseFloat(document.getElementById('bgt-inp').value);
  if(isNaN(v)||v<=0){alert('金額を入力してください');return;}
  const b=db.budgets(); b[catId]=v; db.saveBudgets(b); closeModal(); renderSettings(); renderHome();
}
function deleteBudget(catId){
  const b=db.budgets(); delete b[catId]; db.saveBudgets(b); closeModal(); renderSettings(); renderHome();

function showSavingsModal(){

  showModal(`
    <div class="modal-handle"></div>

    <div class="form-group"><label class="form-label">目標金額（円）</label>

}
function saveSavingsGoal(){
  const v=parseFloat(document.getElementById('sav-inp').value)||0;

function showCatModal(c){
  c=c||{id:null,name:'',color:COLORS[0],emoji:''};
  showModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">${c.id?'カテゴリを編集':'カテゴリを追加'}</div>
    <div class="form-group"><label class="form-label">名前</label>
      <input type="text" class="form-input" id="cat-name" value="${c.name}" placeholder="カテゴリ名"></div>
    <div class="form-group"><label class="form-label">カラー</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${COLORS.map(col=>`<div class="color-swatch ${c.color===col?'sel':''}" style="background:${col}" onclick="pickColor('${col}',this)"></div>`).join('')}</div>
      <input type="hidden" id="cat-color" value="${c.color}"></div>
    <button class="btn-primary" onclick="saveCat('${c.id||''}')">保存する</button>
    ${c.id?`<button class="btn-danger" onclick="deleteCat('${c.id}')">削除する</button>`:''}
  `);
}
function pickColor(col,el){
  document.querySelectorAll('.color-swatch').forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel'); document.getElementById('cat-color').value=col;
}
function saveCat(id){
  const name=document.getElementById('cat-name').value.trim();
  const color=document.getElementById('cat-color').value;
  if(!name){alert('カテゴリ名を入力してください');return;}
  const cats=db.cats();
  if(id){const i=cats.findIndex(c=>c.id===id);if(i>=0)cats[i]={id,name,emoji:'',color};}
  else cats.push({id:uid(),name,emoji:'',color});
  db.saveCats(cats); closeModal(); renderSettings();
}
function deleteCat(id){
  if(!confirm('このカテゴリを削除しますか？'))return;
  db.saveCats(db.cats().filter(c=>c.id!==id)); closeModal(); renderSettings();
}

/* ══════════════════════════════════════
   MIGRATION
══════════════════════════════════════ */
function migrateData(){
  const txs=db.txs(); let changed=false;
  for(const t of txs){
    if(t.type==='expense'&&isCredit(t.payment)){
      const correct=accountingMonth(t.date,t.payment);
      if(t.accountingMonth!==correct){t.accountingMonth=correct;changed=true;}
    }
  }
  if(changed) db.saveTx(txs);
}

/* ══════════════════════════════════════
   BOOT
══════════════════════════════════════ */
migrateData();
renderAll();
</script>
